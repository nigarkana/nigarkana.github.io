<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nigar Kana — Software QA Analyst</title>
<meta name="description" content="Software QA Analyst specializing in manual testing, automation testing, test case design, API testing, regression testing, UAT, and defect management — now extending that rigor into AI-assisted quality engineering.">
<style>
  :root{
    --bg:#E8EDF5;
    --bg-raised:#F4F7FB;
    --bg-card:#FFFFFF;
    --ink:#16233B;
    --ink-soft:#3A4A66;
    --meta:#5E6E89;
    --pass:#1E5C97;
    --pass-bg:#E3EDF7;
    --pass-border:#B9D0E5;
    --amber:#9C4221;
    --amber-bg:#F7EBE3;
    --amber-border:#E8D2C2;
    --line:#CBD5E5;
    --max:980px;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    background:var(--bg);
    background-image: linear-gradient(180deg, #EFF3FA 0%, #E8EDF5 100%);
    color:var(--ink);
    font-family:'Times New Roman', Times, serif;
    line-height:1.65;
    -webkit-font-smoothing:antialiased;
  }
  a{color:inherit;}
  .wrap{max-width:var(--max); margin:0 auto; padding:0 24px;}

  nav{
    position:sticky; top:0; z-index:20;
    background:rgba(239,243,250,0.95);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
  }
  nav .wrap{display:flex; justify-content:space-between; align-items:center; padding:16px 24px;}
  .logo{font-size:19px; font-weight:700; letter-spacing:0.02em; color:var(--ink);}
  .logo span{color:var(--pass);}
  .navlinks{display:flex; gap:26px; font-size:16px; font-weight:600;}
  .navlinks a{text-decoration:none; color:var(--ink-soft); transition:color .15s;}
  .navlinks a:hover, .navlinks a:focus-visible{color:var(--pass);}

  header.hero{padding:88px 0 56px;}
  .status-tag{
    display:inline-flex; align-items:center; gap:9px;
    font-size:14px; font-weight:700; letter-spacing:0.03em;
    color:var(--pass); background:var(--pass-bg);
    border:1px solid var(--pass-border); border-radius:100px;
    padding:6px 16px; margin-bottom:28px;
  }
  .status-tag .dot{width:7px; height:7px; border-radius:50%; background:var(--pass); box-shadow:0 0 8px var(--pass); animation:pulse 1.8s infinite;}
  @keyframes pulse{0%,100%{opacity:1;} 50%{opacity:0.35;}}

  h1{
    font-family:'Times New Roman', Times, serif;
    font-size:clamp(34px,5.4vw,54px);
    font-weight:700;
    line-height:1.15;
    margin:0 0 18px;
    color:var(--ink);
  }
  h1 em{
    font-style:italic; color:var(--pass);
  }
  .hero-sub{
    font-size:18px; color:var(--ink-soft); max-width:620px; margin:0 0 36px;
  }
  .hero-cta{display:flex; gap:14px; flex-wrap:wrap; margin-bottom:48px;}
  .btn{
    font-family:'Times New Roman', Times, serif; font-weight:700; font-size:16px;
    padding:13px 24px; border-radius:8px; text-decoration:none;
    display:inline-flex; align-items:center; gap:8px;
    transition:transform .15s, box-shadow .15s, border-color .15s;
    border:1px solid transparent;
  }
  .btn-primary{background:var(--pass); color:#fff;}
  .btn-primary:hover{transform:translateY(-1px); box-shadow:0 8px 20px rgba(30,92,151,0.30);}
